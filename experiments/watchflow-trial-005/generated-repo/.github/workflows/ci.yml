name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    name: lint typecheck test build e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
      - name: Node.js を設定
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: pnpm を設定
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile
      - name: Playwright ブラウザをインストール
        run: pnpm exec playwright install --with-deps
      - name: Playwright Doctor
        run: pnpm run doctor:playwright
      - name: Mock service Doctor
        run: pnpm run mock:doctor
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit / Component Test
        run: pnpm run test:coverage
      - name: Build
        run: pnpm run build
      - name: E2E
        run: pnpm run test:e2e
      - name: Actions summary
        if: always()
        run: |
          {
            echo "## WatchFlow CI Summary"
            echo ""
            echo "| 項目 | 結果 |"
            echo "| --- | --- |"
            echo "| Lint | ${{ job.status }} |"
            echo "| Typecheck | ${{ job.status }} |"
            echo "| Unit / Component / Coverage | coverage artifact を確認 |"
            echo "| E2E | playwright-report artifact を確認 |"
            echo ""
            if [ -f coverage/coverage-summary.json ]; then
              node - <<'NODE'
          const { readFileSync } = require("node:fs");
          const summary = JSON.parse(readFileSync("coverage/coverage-summary.json", "utf8")).total;
          console.log("### Coverage");
          console.log("");
          console.log("| 指標 | % |");
          console.log("| --- | ---: |");
          for (const key of ["statements", "branches", "functions", "lines"]) {
            console.log(`| ${key} | ${summary[key].pct} |`);
          }
          NODE
            else
              echo "coverage-summary.json は生成されていません。"
            fi
            echo ""
            echo "### E2E"
            echo ""
            echo "CIでは \`pnpm run test:e2e\` により Chromium / Firefox / WebKit を実行します。詳細は playwright-report artifact を確認してください。"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
      - name: Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
      - name: Coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
