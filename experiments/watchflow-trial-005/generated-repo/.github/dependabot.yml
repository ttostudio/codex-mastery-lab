version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    groups:
      nextjs-runtime:
        patterns:
          - next
          - react
          - react-dom
      test-tools:
        patterns:
          - vitest
          - "@playwright/test"
          - "@testing-library/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Tokyo
