name: AIDD Control Plane MVP 016

on:
  push:
    paths:
      - "experiments/aidd-control-plane-mvp-016/**"
      - ".github/workflows/aidd-control-plane.yml"
  pull_request:
    paths:
      - "experiments/aidd-control-plane-mvp-016/**"
      - ".github/workflows/aidd-control-plane.yml"

jobs:
  verification:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: experiments/aidd-control-plane-mvp-016/generated-repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: |
          set -o pipefail
          mkdir -p ../artifacts/terminal
          pnpm install --frozen-lockfile 2>&1 | tee ../artifacts/terminal/install.txt

      - name: Install Playwright browsers
        run: |
          set -o pipefail
          pnpm exec playwright install --with-deps 2>&1 | tee ../artifacts/terminal/playwright-install.txt

      - name: lint
        run: |
          set -o pipefail
          pnpm run lint 2>&1 | tee ../artifacts/terminal/lint.txt

      - name: typecheck
        run: |
          set -o pipefail
          pnpm run typecheck 2>&1 | tee ../artifacts/terminal/typecheck.txt

      - name: test
        run: |
          set -o pipefail
          pnpm run test 2>&1 | tee ../artifacts/terminal/test.txt

      - name: build
        run: |
          set -o pipefail
          pnpm run build 2>&1 | tee ../artifacts/terminal/build.txt

      - name: doctor:aidd
        run: |
          set -o pipefail
          pnpm run doctor:aidd 2>&1 | tee ../artifacts/terminal/doctor-aidd.txt

      - name: mock:doctor
        run: |
          set -o pipefail
          pnpm run mock:doctor 2>&1 | tee ../artifacts/terminal/mock-doctor.txt

      - name: test:e2e
        run: |
          set -o pipefail
          pnpm run test:e2e 2>&1 | tee ../artifacts/terminal/e2e.txt

      - name: Summarize terminal evidence
        if: always()
        run: |
          {
            echo "AIDD Control Plane MVP 016 terminal evidence"
            echo "pnpm install --frozen-lockfile"
            echo "pnpm run lint"
            echo "pnpm run typecheck"
            echo "pnpm run test"
            echo "pnpm run build"
            echo "pnpm run doctor:aidd"
            echo "pnpm run mock:doctor"
            echo "pnpm run test:e2e"
          } > ../artifacts/terminal/verification-summary.txt

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: experiments/aidd-control-plane-mvp-016/generated-repo/coverage
          if-no-files-found: warn

      - name: Upload playwright-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: experiments/aidd-control-plane-mvp-016/generated-repo/playwright-report
          if-no-files-found: warn

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: experiments/aidd-control-plane-mvp-016/generated-repo/test-results
          if-no-files-found: warn

      - name: Upload experiments terminal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiments-terminal-evidence
          path: experiments/aidd-control-plane-mvp-016/artifacts/terminal
          if-no-files-found: warn
