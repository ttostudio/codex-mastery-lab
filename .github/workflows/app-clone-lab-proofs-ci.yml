name: App Clone Lab Proofs CI

on:
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'skills/software-development/aidd-app-clone-lab/**'
      - 'experiments/proof-youtube-focus/generated-repo/**'
      - 'experiments/proof-tiktok-drill/generated-repo/**'
      - '.github/workflows/app-clone-lab-proofs-ci.yml'
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'skills/software-development/aidd-app-clone-lab/**'
      - 'experiments/proof-youtube-focus/generated-repo/**'
      - 'experiments/proof-tiktok-drill/generated-repo/**'
      - '.github/workflows/app-clone-lab-proofs-ci.yml'

jobs:
  proof:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: StudyStream
            workdir: experiments/proof-youtube-focus/generated-repo
            e2e: e2e/studystream.spec.ts
          - name: DrillSwipe
            workdir: experiments/proof-tiktok-drill/generated-repo
            e2e: e2e/drillswipe.spec.ts
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.workdir }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Coverage
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      - name: Playwright doctor
        run: pnpm run doctor:playwright

      - name: Mock doctor
        run: pnpm run mock:doctor

      - name: 3 browser E2E
        run: pnpm exec playwright test ${{ matrix.e2e }} --project=chromium --project=firefox --project=webkit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-coverage
          path: ${{ matrix.workdir }}/coverage
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-playwright-report
          path: ${{ matrix.workdir }}/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-test-results
          path: ${{ matrix.workdir }}/test-results
          if-no-files-found: ignore
