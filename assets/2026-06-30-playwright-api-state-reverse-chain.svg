<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Playwright E2E Contract reverse chain</title>
  <desc id="desc">配送状況トラッカーの欠陥からPlaywright E2E Contractへ逆算する流れ</desc>
  <rect width="1120" height="520" fill="#f5f7fb"/>
  <style>
    .box{fill:#fff;stroke:#d8e2f0;stroke-width:2;rx:18;}
    .head{font:700 22px -apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;fill:#172033;}
    .body{font:16px -apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;fill:#334155;}
    .arrow{stroke:#2563eb;stroke-width:4;marker-end:url(#arrow);}
    .tag{font:700 14px -apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;fill:#1d4ed8;}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <text x="48" y="54" class="head">欠陥 → 理想状態 → 前工程成果物への逆算</text>
  <g transform="translate(48 90)">
    <rect class="box" width="250" height="150"/>
    <text x="22" y="36" class="tag">監査で見つかった欠陥</text>
    <text x="22" y="72" class="body">成功画面と検索はある</text>
    <text x="22" y="100" class="body">offline/timeoutを</text>
    <text x="22" y="128" class="body">ブラウザで検証できない</text>
  </g>
  <line x1="315" y1="165" x2="390" y2="165" class="arrow"/>
  <g transform="translate(405 90)">
    <rect class="box" width="270" height="150"/>
    <text x="22" y="36" class="tag">理想状態</text>
    <text x="22" y="72" class="body">状態切替UIと再試行</text>
    <text x="22" y="100" class="body">検索語・前回一覧保持</text>
    <text x="22" y="128" class="body">E2Eで実挙動を確認</text>
  </g>
  <line x1="695" y1="165" x2="770" y2="165" class="arrow"/>
  <g transform="translate(785 90)">
    <rect class="box" width="285" height="150"/>
    <text x="22" y="36" class="tag">修正指示</text>
    <text x="22" y="72" class="body">requestShipmentsを分離</text>
    <text x="22" y="100" class="body">Playwright日本語テスト</text>
    <text x="22" y="128" class="body">証拠ファイルを残す</text>
  </g>
  <line x1="920" y1="260" x2="920" y2="318" class="arrow"/>
  <g transform="translate(645 335)">
    <rect class="box" width="425" height="132"/>
    <text x="22" y="36" class="tag">AI Task Packetへ追加</text>
    <text x="22" y="70" class="body">playwright_e2e_contract</text>
    <text x="22" y="98" class="body">config_policy / negative_tests / recovery_flows</text>
  </g>
  <line x1="625" y1="401" x2="550" y2="401" class="arrow"/>
  <g transform="translate(245 335)">
    <rect class="box" width="285" height="132"/>
    <text x="22" y="36" class="tag">次回の前工程</text>
    <text x="22" y="70" class="body">状態ごとの期待文言</text>
    <text x="22" y="98" class="body">実行コマンドと設定を先に渡す</text>
  </g>
</svg>
